services:
  deployment-controller:
    container_name: ${DEPLOYMENT_PREFIX}-deployment-controller
    image: ghcr.io/tknika/5g-core-deployment-controller:v0.1.0
    restart: unless-stopped
    expose:
      - 8000
    environment:
      - API_PORT=8000
      - COMPOSE_FILE=/data/compose.yaml
      - ENV_FILE=/data/.env
      - LOG_LEVEL=info
    volumes:
      - ./:/data
      - /usr/bin/docker:/usr/bin/docker
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/libexec/docker/cli-plugins/docker-compose:/usr/libexec/docker/cli-plugins/docker-compose
    networks:
      - default

networks:
  default:
    external: true
    name: docker_open5gs_default
    ipam:
      config:
        - subnet: ${INTERNAL_NETWORK_SUBNET}

x-metadata:
  id: 5g-core
  name: 5G Core Network
  description: 5G Core Network using Open5GS components.
  version: "0.2.0"
  author: Tknika
  changelog: "First release."
  documentation_url: ""
  max_instances: 1
  provides:
    - core-5g
  conflicts:
    - core-*

x-config-schema:
  title: "5G core configuration"
  description: "5G core initial and editable configuration"

  ui:
    install_dialog_title: "5G Core Deployment Installation"
    edit_dialog_title: "Edit 5G Core Configuration"
    show_advanced_by_default: false

  fields:
    - key: OP
      label: "OP (Operator Variant Algorithm Configuration Field)"
      description: "Configuration field for operator variant algorithm in a 4G/5G Core Network"
      data_type: string
      semantic_type: hex
      required: true
      input_source: manual
      default: ""
      validators:
        - type: regex
          value: "^[0-9a-fA-F]{32}$"
      mutable: true
      apply_on_change: update_env

  bindings:
    - field: OP
      targets:
        - service_env.OP

x-deployment-metadata-schema:
  title: "5G Core metadata"
  description: "5G-core metadata parameters"
  fields:
    - key: location.lat
      label: "Latitude"
      data_type: number
      semantic_type: latitude
      required: false
      mutable: true
      validators:
        - type: range
          min: -90
          max: 90
    - key: location.lon
      label: "Longitude"
      data_type: number
      semantic_type: longitude
      required: false
      mutable: true
      validators:
        - type: range
          min: -180
          max: 180
